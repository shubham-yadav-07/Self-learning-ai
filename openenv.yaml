name: MetaMind
version: "1.0.0"
description: >
  Self-Improving AI Environment — Contextual Bandit → Multi-Armed Bandit → Q-Learning.
  Escalates algorithms until quality threshold is met. Rewards adaptation.

task_type: open_ended_reasoning
real_world: true

observation_space:
  type: object
  properties:
    task:               { type: string }
    attempt_number:     { type: integer, minimum: 1, maximum: 3 }
    algorithm:          { type: string }
    level:              { type: string, enum: [easy, medium, hard] }
    action_space:       { type: array, items: { type: string } }
    previous_score:     { type: number, minimum: 0.0, maximum: 1.0, nullable: true }
    previous_response:  { type: string, nullable: true }
    context:            { type: object }

action_space:
  type: object
  properties:
    type:    { type: string, enum: [reason, calculate, retry, change_strategy, submit] }
    content: { type: string }

reward:
  type: continuous
  range: [-1.5, 2.5]
  signals: dense

tasks:
  - id: easy
    difficulty: easy
    threshold: 0.60
    grader: llm_quality_evaluator

  - id: medium
    difficulty: medium
    threshold: 0.75
    grader: llm_quality_evaluator

  - id: hard
    difficulty: hard
    threshold: 0.85
    grader: llm_quality_evaluator

api:
  base_url: http://localhost:8000
  endpoints:
    reset: { method: POST, path: /reset }
    step:  { method: POST, path: /step }
    state: { method: GET,  path: /state }
    run:   { method: POST, path: /run }
